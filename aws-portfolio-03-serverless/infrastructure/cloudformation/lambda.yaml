AWSTemplateFormatVersion: '2010-09-09'
Description: 'Portfolio 03 - Lambda execution role + 4 functions (Python 3.12)'

# 参照実装のみ・未デプロイ（dynamodb.yaml 冒頭のコメント参照）
#
# Lambdaコードはbackend/lambda/*/handler.pyと同一内容をZipFileで直接埋め込んでいる
# （各ファイルが数KB程度と小さく、S3へのコードアップロードが不要になるため）。
# 実際にコードを変更する場合は backend/lambda/ 側を正とし、こちらにも反映すること。

Parameters:
  ProjectName:
    Type: String
    Default: aws-portfolio-03-serverless
    Description: リソース名のプレフィックスとして使用

  TableName:
    Type: String
    Description: dynamodb.yaml の Outputs > TableName の値

  TableArn:
    Type: String
    Description: dynamodb.yaml の Outputs > TableArn の値

Resources:

  # ----------------------------------------------------------
  # Lambda 実行ロール
  # 4つのLambda関数が共通で使うロール（DynamoDB CRUD + CloudWatch Logs）
  # ----------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-exec'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      # CloudWatch Logsへの書き込み権限（AWS管理ポリシー）
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      # DynamoDBテーブルへのCRUD権限（このテーブルのみに限定）
      Policies:
        - PolicyName: !Sub '${ProjectName}-lambda-dynamodb'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !Ref TableArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # create_entry
  # ----------------------------------------------------------
  CreateEntryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-create-entry'
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 3
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Code:
        ZipFile: |
          import json
          import os
          import uuid
          from datetime import datetime, timezone

          import boto3

          # TABLE_NAME はCloudFormationのEnvironmentプロパティから注入される
          table = boto3.resource("dynamodb").Table(os.environ["TABLE_NAME"])


          def lambda_handler(event, context):
              # HTTP API (JWT Authorizer) を通過したリクエストには
              # Cognitoが検証済みのJWTクレームが自動で付与される
              # sub = Cognitoユーザーの一意なID（ユーザーごとのデータ分離に使う）
              user_id = event["requestContext"]["authorizer"]["jwt"]["claims"]["sub"]
              body = json.loads(event.get("body") or "{}")
              content = body.get("content", "").strip()
              # entryType: "gratitude"(今日の感謝) と "reflection"(気づき) を1つのテーブルで区別する
              entry_type = body.get("entryType", "gratitude")

              if not content:
                  return {
                      "statusCode": 400,
                      "body": json.dumps({"message": "content is required"}),
                  }

              now = datetime.now(timezone.utc).isoformat()
              entry = {
                  "userId": user_id,
                  # entryId: 作成時刻を先頭に置くことで、Query結果が自然に時系列順になる
                  "entryId": f"{now}#{uuid.uuid4()}",
                  "content": content,
                  "entryType": entry_type,
                  "createdAt": now,
                  "updatedAt": now,
              }

              table.put_item(Item=entry)

              return {
                  "statusCode": 201,
                  "body": json.dumps(entry),
              }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # list_entries
  # ----------------------------------------------------------
  ListEntriesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-list-entries'
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 3
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Code:
        ZipFile: |
          import json
          import os

          import boto3
          from boto3.dynamodb.conditions import Key

          table = boto3.resource("dynamodb").Table(os.environ["TABLE_NAME"])


          def lambda_handler(event, context):
              user_id = event["requestContext"]["authorizer"]["jwt"]["claims"]["sub"]

              # userId (PK) で絞り込むQuery。Scanと違い、他ユーザーのデータを
              # 読み取る経路が存在しないため安全
              response = table.query(
                  KeyConditionExpression=Key("userId").eq(user_id),
                  ScanIndexForward=False,  # entryIdの降順 = 新しい日記が先頭
              )

              return {
                  "statusCode": 200,
                  "body": json.dumps(response.get("Items", [])),
              }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # update_entry
  # ----------------------------------------------------------
  UpdateEntryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-update-entry'
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 3
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Code:
        ZipFile: |
          import json
          import os
          from datetime import datetime, timezone

          import boto3

          table = boto3.resource("dynamodb").Table(os.environ["TABLE_NAME"])


          def lambda_handler(event, context):
              user_id = event["requestContext"]["authorizer"]["jwt"]["claims"]["sub"]
              entry_id = event["pathParameters"]["id"]
              body = json.loads(event.get("body") or "{}")
              content = body.get("content", "").strip()

              if not content:
                  return {
                      "statusCode": 400,
                      "body": json.dumps({"message": "content is required"}),
                  }

              # Key条件にuserIdを含めることで、他ユーザーのentryIdを推測されても
              # 更新できないようにする（IDOR対策）
              table.update_item(
                  Key={"userId": user_id, "entryId": entry_id},
                  UpdateExpression="SET content = :content, updatedAt = :updatedAt",
                  ConditionExpression="attribute_exists(userId)",
                  ExpressionAttributeValues={
                      ":content": content,
                      ":updatedAt": datetime.now(timezone.utc).isoformat(),
                  },
              )

              return {
                  "statusCode": 200,
                  "body": json.dumps({"entryId": entry_id, "content": content}),
              }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # delete_entry
  # ----------------------------------------------------------
  DeleteEntryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-delete-entry'
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 3
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Code:
        ZipFile: |
          import json
          import os

          import boto3

          table = boto3.resource("dynamodb").Table(os.environ["TABLE_NAME"])


          def lambda_handler(event, context):
              user_id = event["requestContext"]["authorizer"]["jwt"]["claims"]["sub"]
              entry_id = event["pathParameters"]["id"]

              # userIdをKeyに含めることで、他ユーザーのentryIdを削除できないようにする
              table.delete_item(Key={"userId": user_id, "entryId": entry_id})

              return {
                  "statusCode": 204,
                  "body": "",
              }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  CreateEntryFunctionArn:
    Description: create_entry Lambda ARN → api-gateway.yaml のパラメータに使用
    Value: !GetAtt CreateEntryFunction.Arn
  ListEntriesFunctionArn:
    Description: list_entries Lambda ARN → api-gateway.yaml のパラメータに使用
    Value: !GetAtt ListEntriesFunction.Arn
  UpdateEntryFunctionArn:
    Description: update_entry Lambda ARN → api-gateway.yaml のパラメータに使用
    Value: !GetAtt UpdateEntryFunction.Arn
  DeleteEntryFunctionArn:
    Description: delete_entry Lambda ARN → api-gateway.yaml のパラメータに使用
    Value: !GetAtt DeleteEntryFunction.Arn
  CreateEntryFunctionName:
    Value: !Ref CreateEntryFunction
  ListEntriesFunctionName:
    Value: !Ref ListEntriesFunction
  UpdateEntryFunctionName:
    Value: !Ref UpdateEntryFunction
  DeleteEntryFunctionName:
    Value: !Ref DeleteEntryFunction
