name: Portfolio 02 - CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'aws-portfolio-02-custom-domain/**'
  pull_request:
    branches: [main]
    paths:
      - 'aws-portfolio-02-custom-domain/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: aws-portfolio-02-custom-domain

# Phase 02 はインフラのみ（アプリコードなし）
# CloudFormation の更新は手動デプロイを推奨
# このワークフローは将来の自動化に備えて定義しておく
jobs:
  validate:
    name: Validate CloudFormation Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Validate acm.yaml
        run: |
          aws cloudformation validate-template \
            --template-body file://infrastructure/cloudformation/acm.yaml

      - name: Validate cloudfront-v2.yaml
        run: |
          aws cloudformation validate-template \
            --template-body file://infrastructure/cloudformation/cloudfront-v2.yaml

      - name: Validate route53.yaml
        run: |
          aws cloudformation validate-template \
            --template-body file://infrastructure/cloudformation/route53.yaml
