# ============================================================
# Portfolio 03 - フロントエンドデプロイ
# ============================================================
# トリガー:
#   - main ブランチへの push（frontend/配下の変更のみ）→ ビルド + S3デプロイ + CF Invalidation
#   - PR（mainへ）                                    → ビルド確認のみ（デプロイしない）
#   - 手動実行                                        → workflow_dispatch で任意タイミングでデプロイ可能
#
# 設定が必要な値（GitHub → Settings → Secrets and variables → Actions）:
#   Secrets（既存・Phase 1と共通）:
#     AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
#   Variables（新規・機密情報ではないためVariablesを使用）:
#     PHASE3_API_ENDPOINT            = terraform output api_endpoint
#     PHASE3_COGNITO_USER_POOL_ID    = terraform output cognito_user_pool_id
#     PHASE3_COGNITO_CLIENT_ID       = terraform output cognito_user_pool_client_id
#     PHASE3_S3_BUCKET_NAME          = terraform output frontend_bucket_name
#     PHASE3_CLOUDFRONT_DIST_ID      = terraform output cloudfront_distribution_id
#   （APIエンドポイントやCognito Pool IDはビルド後のJSバンドルに埋め込まれ
#     ブラウザから誰でも見える値のため、Secretsではなく素のVariablesを使う）
# ============================================================

name: Portfolio 03 - Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'aws-portfolio-03-serverless/frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'aws-portfolio-03-serverless/frontend/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: aws-portfolio-03-serverless/frontend

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      REACT_APP_AWS_REGION: ap-northeast-1
      REACT_APP_API_ENDPOINT: ${{ vars.PHASE3_API_ENDPOINT }}
      REACT_APP_COGNITO_USER_POOL_ID: ${{ vars.PHASE3_COGNITO_USER_POOL_ID }}
      REACT_APP_COGNITO_CLIENT_ID: ${{ vars.PHASE3_COGNITO_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'aws-portfolio-03-serverless/frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # REACT_APP_* はビルド時にJSバンドルへ埋め込まれる（実行時に読むのではない）
        # ため、上のenvブロックでジョブ全体に設定している

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      REACT_APP_AWS_REGION: ap-northeast-1
      REACT_APP_API_ENDPOINT: ${{ vars.PHASE3_API_ENDPOINT }}
      REACT_APP_COGNITO_USER_POOL_ID: ${{ vars.PHASE3_COGNITO_USER_POOL_ID }}
      REACT_APP_COGNITO_CLIENT_ID: ${{ vars.PHASE3_COGNITO_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'aws-portfolio-03-serverless/frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Deploy to S3
        run: aws s3 sync build/ s3://${{ vars.PHASE3_S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.PHASE3_CLOUDFRONT_DIST_ID }} \
            --paths "/*"
